<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quill Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h1>Quill</h1>
    <p class="subtitle">AI reply drafting for X</p>

    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." />

    <label for="model">Model</label>
    <input type="text" id="model" placeholder="gemini-2.0-flash" />

    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <p class="hint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
