<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Quill Settings</h1>
      <form id="settingsForm">
        <label for="endpoint">API Endpoint URL</label>
        <input
          id="endpoint"
          type="url"
          placeholder="https://your-proxy.example.com/v1/messages"
          autocomplete="off"
        />

        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="Enter API key" autocomplete="off" />

        <label for="model">Model</label>
        <input id="model" type="text" value="claude-sonnet-4-20250514" autocomplete="off" />

        <button id="save" type="submit">Save</button>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
